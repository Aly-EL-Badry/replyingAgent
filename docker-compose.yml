# ──────────────────────────────────────────────────────────────
# docker-compose.yml — FacebookReplay local dev stack
# ──────────────────────────────────────────────────────────────
# Services:
#   db  — PostgreSQL 16 with pgvector extension
#   app — FastAPI application (builds from ./Dockerfile)
#
# Usage:
#   1. Copy .env.docker and fill in your tokens
#   2. docker compose up --build
#   3. Hit http://localhost:8000/docs to explore the API
# ──────────────────────────────────────────────────────────────

services:
  # ── PostgreSQL + pgvector ─────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    container_name: fbreplay-db
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fbreplay_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fbreplay_secret}
      POSTGRES_DB: ${POSTGRES_DB:-fbreplay}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fbreplay_user} -d ${POSTGRES_DB:-fbreplay}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── FastAPI application ───────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fbreplay-app
    restart: unless-stopped
    env_file:
      - .env.docker
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Override DATABASE_URL to point at the 'db' service
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-fbreplay_user}:${POSTGRES_PASSWORD:-fbreplay_secret}@db:5432/${POSTGRES_DB:-fbreplay}

volumes:
  pgdata:
    driver: local
